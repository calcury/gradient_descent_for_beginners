<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lang</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            /* 让内容垂直水平居中 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }

        h1 {
            color: var(--primary-color);
        }

        h2 {
            color: var(--accent-color);
            margin-top: 30px;
        }

        h3 {
            color: var(--primary-color);
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 25px;
            margin-bottom: 25px;
        }

        .controls {
            background: #eef2f7;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        button.secondary {
            background-color: #95a5a6;
        }

        button.danger {
            background-color: var(--danger-color);
        }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
            margin-top: 20px;
            background: #fff;
            border: 1px solid #eee;
        }

        .stat-box {
            display: inline-block;
            margin-right: 20px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .highlight {
            color: var(--danger-color);
            font-weight: bold;
        }

        .nav-links {
            text-align: center;
            margin-top: 40px;
        }

        .nav-links a {
            margin: 0 10px;
            text-decoration: none;
            color: var(--accent-color);
            font-weight: bold;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        input[type="range"] {
            width: 200px;
        }

        .label-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Gradient Decent for Beginners</h1>
        </header>
        <div class="controls">
            <!-- 中文按钮，跳转到中文页面 -->
            <button onclick="window.location.href='./html/index.html'">中文</button>
            <!-- English按钮，跳转到英文页面 -->
            <button onclick="window.location.href='./html/index_en.html'">English</button>
        </div>
    </div>
</body>
</html>
